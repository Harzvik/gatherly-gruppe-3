<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/gatherly.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/pages/utforsk.css">
    <title>Gatherly - Utforsk</title>
  </head>
  <body>
    <!--Navbar her-->
    <g-header></g-header>

    <main class="explore-container">      
      <section class="explore-header">
        <h1>Utforsk dine interesser!</h1>

        <div class="filter-section-wrapper">
          <div class="tag-row">
            <div class= "category-tags" id="tagContainer">
              <button class="tag-btn">Teknologi</button>
              <button class="tag-btn">Sport</button>
              <button class="tag-btn">Håndverk</button>
              <button class="tag-btn">Gaming</button>
              <!-- Skjulte tags -->
              <button class="tag-btn hidden-tag">Reise</button>
              <button class="tag-btn hidden-tag">Helse</button>
              <button class="tag-btn hidden-tag">Business</button>
            </div>
            <button class="arrow-icon" id="expandBtn"></span>
          </div>


          <div class="action-row">
            <button class="dropdown-btn">Kommende uke</button>
            <button class="filter-icon-btn">
              Filter
              <img src="/assets/component_assets/icons/filter_1.webp" alt="filter ikon">
            </button>
          </div>
        </div>
      </section>

      <!-- ARRAY -->
      <section id="event-grid" class="event-grid">
      </section>

      <button class="sticky-addBtn">
        <img src="/assets/component_assets/icons/Opprett_btn.png" alt="Opprett nytt arrangement">
      </button>
    </main>

    <script type="module" src="./src/ts/pages/utforsk.ts"></script>
  </body>
</html>
