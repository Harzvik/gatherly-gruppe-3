<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/gatherly.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/css/pages/index.css" />
    <title>Gatherly - Hjem</title>
  </head>
  <body>
    <g-header></g-header>

    <!-- HERO SECTION -->
    <section class="hero-section">
      <div class="hero-content">
        <div class="hero-text">
          <h1 id="welcome-message">Velkommen til Gatherly!</h1>
          <p>Her er en oversikt over arrangementene du deltar på og har lagret.</p>
        </div>

        <div class="hero-img-wrapper">
          <div class="tape tape-top"></div>
          <div class="img-container">
            <img src="./public/assets/forside.jpg" alt="Welcome image" style="width: 100%; height: 100%; object-fit: cover;" />
          </div>
          <div class="tape tape-bottom"></div>
        </div>
      </div>
    </section>

    <!-- CONTAINER FOR THE FEED -->
    <main class="explore-container">
      
      <!-- DINE ARRANGEMENTER -->
      <section class="user-events-section">
        <h2 class="section-title">Arrangementer du deltar på</h2>
        <div id="joined-events-grid" class="event-grid"></div>
      </section>

      <!-- LIKTE ARRANGEMENTER -->
      <section class="user-events-section">
        <h2 class="section-title">Dine likte arrangementer</h2>
        <div id="liked-events-grid" class="event-grid"></div>
      </section>

    </main>

    <script type="module" src="./src/ts/pages/index.ts"></script>
  </body>
</html>
