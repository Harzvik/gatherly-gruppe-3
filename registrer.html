<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatherly - Registrer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-text">Gatherly</span>
                <span class="logo-dot">.</span>
            </div>
            <nav>
                <a href="#" class="nav-link">HJEM</a>
                <a href="#" class="nav-link">UTFORSK</a>
                <a href="#" class="nav-link">KONTAKT OSS</a>
                <a href="index.html" class="nav-link active">LOGG INN</a>
            </nav>
        </header>

        <main>
            <div class="form-container">
                <div class="tape tape-left"></div>
                <div class="tape tape-right"></div>
                
                <form id="registerForm" class="auth-form">
                    <h1>Bli en del av Gatherly!</h1>
                    
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="E-post" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="Passord" required>
                    </div>
                    
                    <div class="form-group">
                        <input type="tel" id="phone" placeholder="Telefonnummer" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Registrer deg</button>
                </form>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
